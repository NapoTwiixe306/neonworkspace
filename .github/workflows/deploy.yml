name: Deploy jmcorp

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_DIR: /home/ubuntu/jmcorp

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test SSH
        run: sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER || 'ubuntu' }}@${{ secrets.VPS_IP }} "echo SSH OK"

      - name: Deploy to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER || 'ubuntu' }}@${{ secrets.VPS_IP }} "
            mkdir -p $DEPLOY_DIR &&
            if [ -f $DEPLOY_DIR/.env ]; then cp $DEPLOY_DIR/.env /tmp/jmcorp.env.backup; fi &&
            cd $DEPLOY_DIR &&
            GIT_SSH_COMMAND=\"ssh -i ~/.ssh/jmcorp_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new\" git fetch origin main &&
            git reset --hard origin/main &&
            if [ -f /tmp/jmcorp.env.backup ]; then cp /tmp/jmcorp.env.backup .env; fi &&
            if [ ! -f .env ]; then echo '.env missing on server. Create it once in '$DEPLOY_DIR' then redeploy.' && exit 1; fi &&
            chmod 600 .env &&
            docker compose up -d --build
          "
